 调出 Claude 的所有快捷动作\",\"link\":\"/claude-code/36-slash-commands\"},{\"text\":\"37 · 检查点（Checkpoints）：随时能倒带的安全网\",\"link\":\"/claude-code/37-checkpoints\"}]},{\"text\":\"六 · 高级参考与实战\",\"collapsed\":true,\"items\":[{\"text\":\"38 · 插件参考手册：把自己那套配置，打成一个能发出去的包\",\"link\":\"/claude-code/38-plugins-reference\"},{\"text\":\"39 · 实战入门：拿一个真需求，从开工到交付走一整趟\",\"link\":\"/claude-code/39-getting-started-practice\"},{\"text\":\"40 · Chrome：让它操作浏览器\",\"link\":\"/claude-code/40-chrome\"},{\"text\":\"41 · 并行任务：让几个 Claude 同时开工，而不是排队\",\"link\":\"/claude-code/41-parallel-tasks\"},{\"text\":\"42 · 环境变量：藏在背后那排「总开关」\",\"link\":\"/claude-code/42-env-vars\"},{\"text\":\"43 · Git 工作流：让 Claude 当你的 git 副手\",\"link\":\"/claude-code/43-git-workflow\"},{\"text\":\"44 · GitHub Actions：在 PR 里 @ 一下，让 Claude 自己干活\",\"link\":\"/claude-code/44-github-actions\"},{\"text\":\"45 · Agent SDK：把 Claude Code 的能力搬进你自己的程序\",\"link\":\"/claude-code/45-agent-sdk\"},{\"text\":\"46 · 开发配置：把 Claude 干活的「工作环境」调顺\",\"link\":\"/claude-code/46-dev-config\"},{\"text\":\"47 · Voice 语音模式：把提示词说出来，而不是打出来\",\"link\":\"/claude-code/47-voice\"},{\"text\":\"48 · 综合实战：从零到上线，把所学串成一条线\",\"link\":\"/claude-code/48-capstone-project\"}]},{\"text\":\"七 · 收尾与查阅\",\"collapsed\":true,\"items\":[{\"text\":\"49 · 最佳实践：把零散的好习惯，攒成一套能照着做的心法\",\"link\":\"/claude-code/49-best-practices\"},{\"text\":\"50 · 反模式：常见的错误用法\",\"link\":\"/claude-code/50-anti-patterns\"},{\"text\":\"51 · 常见问题排查（FAQ / Troubleshooting）\",\"link\":\"/claude-code/51-troubleshooting\"},{\"text\":\"52 · 术语表（小白友好）：把这一路的「黑话」一次性翻译成人话\",\"link\":\"/claude-code/52-glossary\"},{\"text\":\"53 · 制作视频（Remotion）〔选读〕\",\"link\":\"/claude-code/53-remotion-video\"}]}],\"/codex/\":[{\"text\":\"一 · 基础入门\",\"collapsed\":true,\"items\":[{\"text\":\"01 · 认识 Codex 与四种入口\",\"link\":\"/codex/01-what-is-codex\"},{\"text\":\"02 · Codex 核心概念速览\",\"link\":\"/codex/02-core-concepts\"},{\"text\":\"03 · 安装与登录（Mac / Windows / Linux）\",\"link\":\"/codex/03-install\"},{\"text\":\"04 · 订阅与计费\",\"link\":\"/codex/04-pricing\"},{\"text\":\"05 · 接入 DeepSeek 等国产模型\",\"link\":\"/codex/05-third-party-models\"}]},{\"text\":\"二 · 各入口怎么上手\",\"collapsed\":true,\"items\":[{\"text\":\"06 · 跑通第一个任务\",\"link\":\"/codex/06-first-task\"},{\"text\":\"07 · 桌面 App 全景\",\"link\":\"/codex/07-desktop-app\"},{\"text\":\"08 · 命令行 CLI 上手\",\"link\":\"/codex/08-cli\"},{\"text\":\"09 · IDE 扩展（VS Code 等）\",\"link\":\"/codex/09-ide\"},{\"text\":\"10 · 云端 Codex Cloud：把活丢上云，喝着咖啡等结果\",\"link\":\"/codex/10-cloud\"},{\"text\":\"11 · 项目说明书 AGENTS.md：把规矩焊进 Codex 的开工流程\",\"link\":\"/codex/11-agents-md\"}]},{\"text\":\"三 · 核心交互与操作\",\"collapsed\":true,\"items\":[{\"text\":\"12 · 斜杠命令与快捷键：会话里的「快捷操作面板」\",\"link\":\"/codex/12-slash-commands\"},{\"text\":\"13 · 提示词（Prompt）写法：把话说到 Codex 心坎里\",\"link\":\"/codex/13-prompting\"},{\"text\":\"14 · 四类日常工作流：探索、修 bug、重构、写测试\",\"link\":\"/codex/14-workflows\"},{\"text\":\"15 · 权限、沙箱与审批：放多松、收多紧，自己拧\",\"link\":\"/codex/15-permissions\"},{\"text\":\"16 · 安全与风险边界：到底该不该放手让它碰你的代码\",\"link\":\"/codex/16-security\"},{\"text\":\"17 · 电脑操控与浏览器（Computer Use）：让 Codex 长出手\",\"link\":\"/codex/17-computer-use\"}]},{\"text\":\"四 · 高级功能扩展\",\"collapsed\":true,\"items\":[{\"text\":\"18 · config.toml 配置详解：一个文件管住所有旋钮\",\"link\":\"/codex/18-config\"},{\"text\":\"19 · 记忆系统（Memories 与 Chronicle）：让 Codex 跨会话记住你\",\"link\":\"/codex/19-memory\"},{\"text\":\"20 · 用 MCP 接外部工具：给 Codex 装上「外接口」\",\"link\":\"/codex/20-mcp\"},{\"text\":\"21 · 子代理（Subagents）：把活儿拆出去并行跑，但只有「你开口」它才拆\",\"link\":\"/codex/21-subagents\"},{\"text\":\"22 · Agent Skills 技能：把一套活儿打包，教会 Codex 自己接\",\"link\":\"/codex/22-skills\"},{\"text\":\"23 · 插件（Plugins）：一键装一整套能力，别再一个个手配\",\"link\":\"/codex/23-plugins\"},{\"text\":\"24 · 规则与钩子（Rules & Hooks）：给 Codex 装上「卡点」和「扳机」\",\"link\":\"/codex/24-hooks\"}]},{\"text\":\"五 · 工程化与自动化\",\"collapsed\":true,\"items\":[{\"text\":\"25 · Worktrees 并行隔离：让几个 Codex 各干各的，互不打架\",\"link\":\"/codex/25-worktrees\"},{\"text\":\"26 · Git 与 GitHub 集成：让 Codex 在你的 PR 里当审查员\",\"link\":\"/codex/26-git-github\"},{\"text\":\"27 · 自动化与 CI/CD：让 Codex 在你不在的时候自己干活\",\"link\":\"/codex/27-automation\"},{\"text\":\"28 · 非交互模式 codex exec：把它塞进脚本和 CI 里跑\",\"link\":\"/codex/28-noninteractive\"},{\"text\":\"29 · Slack / Linear 与 SDK 集成：在别处召唤 Codex，把它嵌进你自己的产品\",\"link\":\"/codex/29-integrations\"}]},{\"text\":\"六 · 实战与进阶\",\"collapsed\":true,\"items\":[{\"text\":\"30 · 怎么选模型：同一句话，到底该派哪个模型去跑\",\"link\":\"/codex/30-models\"},{\"text\":\"31 · 进阶技巧与提速：拖慢你的不是模型，是你给的烂上下文\",\"link\":\"/codex/31-speed\"},{\"text\":\"32 · 从 Claude Code 迁移：旧地图换个工具，照样能找到家\",\"link\":\"/codex/32-migrate-from-claude-code\"},{\"text\":\"33 · Windows 使用要点：原生还是 WSL，到底怎么跑才省心\",\"link\":\"/codex/33-windows\"},{\"text\":\"34 · 综合实战：从零给一个 TODO 小工具加功能、提交一次\",\"link\":\"/codex/34-capstone\"}]},{\"text\":\"七 · 收尾与查阅\",\"collapsed\":true,\"items\":[{\"text\":\"35 · 命令与配置速查表\",\"link\":\"/codex/35-cheatsheet\"},{\"text\":\"36 · 最佳实践：那些「正确的废话」之外，真正能落地的几条\",\"link\":\"/codex/36-best-practices\"},{\"text\":\"37 · 常见问题排查：装不上、登不了、不肯改文件，挨个拆\",\"link\":\"/codex/37-faq\"},{\"text\":\"38 · 术语表\",\"link\":\"/codex/38-glossary\"},{\"text\":\"39 · 企业管理与治理：一个人玩和一家公司用，是两件事\",\"link\":\"/codex/39-enterprise\"}]}]},\"outline\":{\"label\":\"本页目录\",\"level\":[2,3]},\"docFooter\":{\"prev\":\"上一篇\",\"next\":\"下一篇\"},\"search\":{\"provider\":\"local\",\"options\":{\"translations\":{\"button\":{\"buttonText\":\"搜索\",\"buttonAriaLabel\":\"搜索\"},\"modal\":{\"displayDetails\":\"显示详情\",\"resetButtonTitle\":\"清除查询\",\"backButtonTitle\":\"关闭\",\"noResultsText\":\"没有找到结果\",\"footer\":{\"selectText\":\"选择\",\"navigateText\":\"切换\",\"closeText\":\"关闭\"}}}}},\"darkModeSwitchLabel\":\"深色模式\",\"returnToTopLabel\":\"回到顶部\",\"sidebarMenuLabel\":\"目录\",\"socialLinks\":[{\"icon\":\"github\",\"link\":\"https://github.com/Get-David/Get-David.github.io\",\"ariaLabel\":\"David Studio GitHub\"}]},\"locales\":{},\"scrollOffset\":134,\"cleanUrls\":true}");</script>
